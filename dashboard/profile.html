<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rent — профіль</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="locale-switch">
      <button type="button" data-lang="uk" aria-pressed="true">
        <span data-i18n="locale.uk">УК</span>
      </button>
      <button type="button" data-lang="en" aria-pressed="false">
        <span data-i18n="locale.en">EN</span>
      </button>
    </div>
    <div id="dash-nav"></div>
    <div class="page-body">
      <header style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem">
        <h1 style="font-size: 1.5rem; font-weight: 600; margin: 0" data-i18n="profile.title"></h1>
        <a href="index.html" class="subtitle" style="align-self: center" data-i18n="dash.back"></a>
      </header>
      <p class="subtitle" style="margin-bottom: 1rem">
        <a href="#" id="preview-link" target="_blank" rel="noopener" data-i18n="profile.preview"></a>
      </p>
      <form id="prof-form" class="form-stack">
        <div class="field">
          <label>
            <span class="label-text" data-i18n="profile.storeName"></span>
            <input name="name" id="pf-name" required />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="profile.description"></span>
            <textarea name="description" id="pf-desc" data-i18n-placeholder="profile.descriptionPlaceholder"></textarea>
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="profile.mainAddress"></span>
            <input name="address" id="pf-addr" />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="profile.map.addressFromPoint"></span>
            <input name="locationAddress" id="pf-locaddr" placeholder="" />
          </label>
        </div>
        <div class="field" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem">
          <label>
            <span class="label-text">Lat</span>
            <input name="lat" id="pf-lat" type="text" placeholder="50.45" />
          </label>
          <label>
            <span class="label-text">Lng</span>
            <input name="lng" id="pf-lng" type="text" placeholder="30.52" />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="profile.portfolio.hint"></span>
            <textarea name="portfolio" id="pf-port" rows="4"></textarea>
          </label>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="profile.save"></button>
      </form>
    </div>
    <script src="../assets/js/rent-i18n.js"></script>
    <script src="../assets/js/rent-crypto.js"></script>
    <script src="../assets/js/rent-slots.js"></script>
    <script src="../assets/js/rent-format.js"></script>
    <script src="../assets/js/rent-db.js"></script>
    <script src="../assets/js/rent-auth.js"></script>
    <script src="../assets/js/rent-nav.js"></script>
    <script>
      (function () {
        var u = RentAuth.requireOwner("../login.html");
        if (!u) return;
        var biz = RentDB.getPrimaryBusiness(u.id);
        if (!biz) {
          location.href = "../business/create.html";
          return;
        }
        RentNav.renderDashNav(document.getElementById("dash-nav"), {
          businessName: biz.name,
          active: "profile",
        });

        function fill() {
          document.getElementById("pf-name").value = biz.name;
          document.getElementById("pf-desc").value = biz.description || "";
          document.getElementById("pf-addr").value = biz.address || "";
          document.getElementById("pf-locaddr").value = biz.locationAddress || "";
          document.getElementById("pf-lat").value =
            biz.locationLat != null ? String(biz.locationLat) : "";
          document.getElementById("pf-lng").value =
            biz.locationLng != null ? String(biz.locationLng) : "";
          document.getElementById("pf-port").value = (biz.portfolio || []).join("\n");
          var prev = new URL("../book.html", window.location.href);
          prev.searchParams.set("slug", biz.slug);
          var a = document.getElementById("preview-link");
          a.href = prev.href;
        }
        fill();

        document.getElementById("prof-form").addEventListener("submit", function (e) {
          e.preventDefault();
          var fd = new FormData(e.target);
          var lat = parseFloat(String(fd.get("lat")).replace(",", "."));
          var lng = parseFloat(String(fd.get("lng")).replace(",", "."));
          var portfolio = String(fd.get("portfolio") || "")
            .split("\n")
            .map(function (s) {
              return s.trim();
            })
            .filter(Boolean);
          RentDB.updateBusiness(biz.id, {
            name: fd.get("name"),
            description: fd.get("description") || "",
            address: fd.get("address") || "",
            locationAddress: fd.get("locationAddress") || "",
            locationLat: isNaN(lat) ? null : lat,
            locationLng: isNaN(lng) ? null : lng,
            portfolio: portfolio,
          });
          biz = RentDB.getBusinessById(biz.id);
          fill();
          RentNav.renderDashNav(document.getElementById("dash-nav"), {
            businessName: biz.name,
            active: "profile",
          });
        });
      })();
    </script>
  </body>
</html>
