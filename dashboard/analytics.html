<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rent — аналітика</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="locale-switch">
      <button type="button" data-lang="uk" aria-pressed="true">
        <span data-i18n="locale.uk">УК</span>
      </button>
      <button type="button" data-lang="en" aria-pressed="false">
        <span data-i18n="locale.en">EN</span>
      </button>
    </div>
    <div id="dash-nav"></div>
    <div class="page-body">
      <header style="display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem">
        <h1 style="font-size: 1.5rem; font-weight: 600; margin: 0" data-i18n="analytics.title"></h1>
        <a href="index.html" class="subtitle" style="align-self: center" data-i18n="dash.back"></a>
      </header>
      <ul class="list-plain">
        <li>
          <span class="subtitle" data-i18n="analytics.totalBookings"></span><br />
          <strong id="a-total" style="font-size: 1.25rem">0</strong>
        </li>
        <li>
          <span class="subtitle" data-i18n="analytics.today"></span><br />
          <strong id="a-today" style="font-size: 1.25rem">0</strong>
        </li>
        <li>
          <span class="subtitle" data-i18n="analytics.cancellations"></span><br />
          <strong id="a-can" style="font-size: 1.25rem">0</strong>
        </li>
        <li>
          <span class="subtitle" data-i18n="analytics.topService"></span><br />
          <strong id="a-top" style="font-size: 1.25rem">—</strong>
        </li>
      </ul>
    </div>
    <script src="../assets/js/rent-i18n.js"></script>
    <script src="../assets/js/rent-crypto.js"></script>
    <script src="../assets/js/rent-slots.js"></script>
    <script src="../assets/js/rent-format.js"></script>
    <script src="../assets/js/rent-db.js"></script>
    <script src="../assets/js/rent-auth.js"></script>
    <script src="../assets/js/rent-nav.js"></script>
    <script>
      (function () {
        var u = RentAuth.requireOwner("../login.html");
        if (!u) return;
        var biz = RentDB.getPrimaryBusiness(u.id);
        if (!biz) {
          location.href = "../business/create.html";
          return;
        }
        RentNav.renderDashNav(document.getElementById("dash-nav"), {
          businessName: biz.name,
          active: "analytics",
        });
        var a = RentDB.analytics(biz.id);
        document.getElementById("a-total").textContent = String(a.total);
        document.getElementById("a-today").textContent = String(a.today);
        document.getElementById("a-can").textContent = String(a.cancellations);
        document.getElementById("a-top").textContent = a.topService || "—";
      })();
    </script>
  </body>
</html>
