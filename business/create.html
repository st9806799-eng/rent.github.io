<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rent — створити бізнес</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <div class="locale-switch">
      <button type="button" data-lang="uk" aria-pressed="true">
        <span data-i18n="locale.uk">УК</span>
      </button>
      <button type="button" data-lang="en" aria-pressed="false">
        <span data-i18n="locale.en">EN</span>
      </button>
    </div>

    <div class="shell">
      <header class="shell-header">
        <div>
          <h1 data-i18n="business.create.title"></h1>
          <p class="subtitle" data-i18n="business.create.intro"></p>
        </div>
      </header>

      <p id="bc-err" class="text-error hidden"></p>

      <form class="form-stack" id="biz-create-form">
        <div class="field">
          <label>
            <span class="label-text" data-i18n="business.field.name"></span>
            <input name="name" required data-i18n-placeholder="business.field.name" />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="business.field.phone"></span>
            <input name="phone" required type="tel" data-i18n-placeholder="business.field.phone" />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="business.field.address"></span>
            <input name="address" data-i18n-placeholder="business.field.address" />
          </label>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="business.submit"></button>
      </form>
      <p class="form-footer">
        <a href="../index.html" data-i18n="nav.home"></a>
      </p>
    </div>

    <script src="../assets/js/rent-i18n.js"></script>
    <script src="../assets/js/rent-crypto.js"></script>
    <script src="../assets/js/rent-slots.js"></script>
    <script src="../assets/js/rent-format.js"></script>
    <script src="../assets/js/rent-db.js"></script>
    <script src="../assets/js/rent-auth.js"></script>
    <script>
      (function () {
        var u = RentAuth.requireOwner("../login.html");
        if (!u) return;
        if (RentDB.getPrimaryBusiness(u.id)) {
          location.href = "../dashboard/index.html";
          return;
        }
      })();
      document.getElementById("biz-create-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var err = document.getElementById("bc-err");
        err.classList.add("hidden");
        var u = RentAuth.getSessionUser();
        var fd = new FormData(e.target);
        var r = RentDB.createBusiness(u.id, {
          name: fd.get("name"),
          phone: fd.get("phone"),
          address: fd.get("address") || "",
        });
        if (r.error) {
          err.textContent = r.error;
          err.classList.remove("hidden");
          return;
        }
        location.href = "../dashboard/index.html";
      });
    </script>
  </body>
</html>
