<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rent — реєстрація</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="locale-switch">
      <button type="button" data-lang="uk" aria-pressed="true"><span data-i18n="locale.uk">УК</span></button>
      <button type="button" data-lang="en" aria-pressed="false"><span data-i18n="locale.en">EN</span></button>
    </div>

    <div class="shell">
      <header class="shell-header">
        <h1 data-i18n="register.title">Створити акаунт</h1>
      </header>

      <p class="note-box" data-i18n="auth.staticHint"></p>

      <form class="form-stack" id="register-form" style="margin-top: 1rem">
        <div class="field">
          <label>
            <span class="label-text" data-i18n="auth.email">Email</span>
            <input name="email" type="email" required autocomplete="email" data-i18n-placeholder="auth.email" />
          </label>
        </div>
        <div class="field">
          <label>
            <span class="label-text" data-i18n="auth.password">Пароль</span>
            <input
              name="password"
              type="password"
              required
              autocomplete="new-password"
              data-i18n-placeholder="auth.password"
            />
          </label>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="register.submit">Зареєструватися</button>
      </form>

      <p class="form-footer">
        <span data-i18n="register.haveAccount">Вже є акаунт?</span>
        <a href="login.html" data-i18n="register.signIn">Увійти</a>
      </p>
      <p class="form-footer" style="margin-top: 0.5rem">
        <a href="index.html" data-i18n="nav.home">На головну</a>
      </p>
    </div>

    <script src="assets/i18n.js"></script>
    <script>
      document.getElementById("register-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var lang = window.RentI18n.getLang();
        alert(
          lang === "uk"
            ? "Статична сторінка: реєстрація на сервері недоступна."
            : "Static page: server registration is not available."
        );
      });
    </script>
  </body>
</html>
